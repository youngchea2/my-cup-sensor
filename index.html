<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Sensor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <h1>AI 컵 센서 테스트</h1>
    <div id="camera-container"></div>
    <div id="results" style="font-size: 24px; margin-top: 20px;">결과 대기 중...</div>

    <script src="edge-impulse-standalone.js"></script>
    <script src="run-impulse.js"></script>

    <script>
        // AI 엔진이 결과를 내보낼 때마다 실행되는 함수를 가로챕니다.
        const originalLog = console.log;
        console.log = function (message) {
            originalLog.apply(console, arguments);
            
            // 결과값에 'CUP'이 포함되어 있는지 확인
            if (typeof message === 'string' && message.includes('CUP')) {
                document.getElementById('results').innerText = message;
                
                // 확률이 0.8 이상인지 체크 (문자열 분석)
                const scoreMatch = message.match(/CUP\s*\(([0-9.]+)\)/);
                if (scoreMatch && parseFloat(scoreMatch[1]) > 0.8) {
                    if (navigator.vibrate) {
                        navigator.vibrate(500); // 0.5초 진동
                    }
                }
            }
        };
    </script>
</body>
</html>
