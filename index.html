<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Cup Sensor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        video { width: 100%; max-width: 400px; background: #000; border-radius: 10px; }
        button { padding: 15px 30px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 8px; margin: 10px; }
    </style>
</head>
<body>
    <h1>AI 컵 센서</h1>
    <div id="status">준비 완료</div>
    <button id="start-btn">카메라 및 센서 시작</button>
    <br>
    <video id="video" autoplay playsinline></video>
    <div id="results" style="font-size: 24px; margin-top: 15px; font-weight: bold;"></div>

    <script src="edge-impulse-standalone.js"></script>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const results = document.getElementById('results');
        let classifier;

        document.getElementById('start-btn').onclick = async () => {
            try {
                status.innerText = "초기화 중...";
                
                // 1. 카메라 켜기 (사용자 인터랙션 이후 실행)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } // 후면 카메라 우선
                });
                video.srcObject = stream;
                status.innerText = "카메라 연결됨. 모델 로딩 중...";

                // 2. 모델 초기화
                classifier = new EdgeImpulseClassifier();
                await classifier.init();
                status.innerText = "작동 중!";
                
                // 3. 반복 분석 시작
                setInterval(classify, 500); // 0.5초마다 판독

            } catch (err) {
                status.innerText = "에러: " + err.message;
                console.error(err);
            }
        };

        async function classify() {
            if (!classifier) return;
            
            // 실시간 분석 결과 가져오기
            // (참고: 이 함수는 모델에 따라 getFeaturesFromVideo 등 별도 변환이 필요할 수 있습니다.)
            const res = await classifier.classify(); 
            
            if (res.classification) {
                const cup = res.classification.find(i => i.label === 'CUP');
                const score = cup ? cup.value : 0;
                results.innerText = "CUP: " + (score * 100).toFixed(1) + "%";

                if (score > 0.8) {
                    results.style.color = "red";
                    if (navigator.vibrate) navigator.vibrate(500);
                } else {
                    results.style.color = "black";
                }
            }
        }
    </script>
</body>
</html>
