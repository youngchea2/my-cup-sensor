<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Cup Sensor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        #container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 500px; }
        video { width: 100%; background: #000; border-radius: 10px; display: none; margin-top: 10px; }
        button { padding: 15px 30px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; display: none; width: 100%; }
        #status { margin: 15px 0; font-weight: bold; color: #555; }
        #results { font-size: 24px; margin-top: 15px; font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>
    <div id="container">
        <h1>AI 컵 센서</h1>
        <div id="status">시스템 체크 중...</div>
        <button id="start-btn">카메라 및 센서 시작</button>
        <video id="video" autoplay playsinline></video>
        <div id="results"></div>
    </div>

    <script>
        const status = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const video = document.getElementById('video');
        const results = document.getElementById('results');
        let classifier;

        // [핵심] 라이브러리를 동적으로 로드하고 완료될 때까지 기다립니다.
        function loadEdgeImpulse() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                // 캐시 방지를 위해 랜덤 쿼리 추가
                script.src = "edge-impulse-standalone.js?v=" + Date.now();
                script.onload = resolve;
                script.onerror = () => reject(new Error("JS 파일을 찾을 수 없습니다."));
                document.head.appendChild(script);
            });
        }

        async function startSystem() {
            try {
                status.innerText = "라이브러리 로딩 중...";
                await loadEdgeImpulse();
                
                status.innerText = "로딩 완료! 버튼을 눌러주세요.";
                status.style.color = "green";
                startBtn.style.display = "block"; // 로딩이 끝나야 버튼이 나타남
            } catch (err) {
                status.innerText = "오류: " + err.message;
                status.style.color = "red";
            }
        }

        startBtn.onclick = async () => {
            try {
                startBtn.style.display = "none";
                status.innerText = "카메라 및 AI 초기화 중...";

                // 1. 카메라 기동
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                video.style.display = "block";

                // 2. 모델 초기화 (이제 무조건 로드된 상태임)
                classifier = new EdgeImpulseClassifier();
                await classifier.init();
                
                status.innerText = "감시 중...";
                setInterval(classify, 500);
            } catch (err) {
                status.innerText = "초기화 실패: " + err.message;
            }
        };

        async function classify() {
            if (!classifier) return;
            try {
                const res = await classifier.classify(); 
                if (res.classification) {
                    const cup = res.classification.find(i => i.label === 'CUP');
                    const score = cup ? cup.value : 0;
                    results.innerText = "CUP: " + (score * 100).toFixed(1) + "%";

                    if (score > 0.8) {
                        if (navigator.vibrate) navigator.vibrate(500); 
                    }
                }
            } catch (e) { }
        }

        // 시스템 시작
        startSystem();
    </script>
</body>
</html>
