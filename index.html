<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Cup Sensor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        video { width: 100%; max-width: 400px; background: #000; border-radius: 10px; }
        button { padding: 15px 30px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 8px; margin: 10px; }
    </style>
</head>
<body>
    <h1>AI 컵 센서</h1>
    <div id="status">준비 완료</div>
    <button id="start-btn">카메라 및 센서 시작</button>
    <br>
    <video id="video" autoplay playsinline></video>
    <div id="results" style="font-size: 24px; margin-top: 15px; font-weight: bold;"></div>

    <script src="edge-impulse-standalone.js" onerror="document.getElementById('status').innerText='에러: js파일을 로드할 수 없음'"></script>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const results = document.getElementById('results');
        let classifier;

        document.getElementById('start-btn').onclick = async () => {
            try {
                // 1. 카메라 켜기 (이미 성공한 부분)
                status.innerText = "카메라 연결 시도 중...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                status.innerText = "모델 초기화 중... (WASM 파일 로딩)";

                // 2. 모델 초기화 (에러가 발생했던 부분)
                if (typeof EdgeImpulseClassifier === 'undefined') {
                    throw new Error("라이브러리 로드 실패: js파일 이름을 확인하세요");
                }
                classifier = new EdgeImpulseClassifier();
                await classifier.init();
                status.innerText = "작동 중! 컵을 비춰보세요.";
                
                // 3. 반복 분석 시작
                setInterval(classify, 500); // 0.5초마다 판독

            } catch (err) {
                status.innerText = "에러: " + err.message;
                status.style.color = "red";
                console.error(err);
            }
        };

        async function classify() {
            if (!classifier) return;
            
            // 실시간 분석 결과 가져오기 (실제 내부 로직은 모델에 따라 다를 수 있음)
            const result = await classifier.classify(getFeaturesFromVideo(video)); 

            if (result.classification) {
                const cup = result.classification.find(i => i.label === 'CUP');
                const score = cup ? cup.value : 0;
                results.innerText = "CUP: " + (score * 100).toFixed(1) + "%";

                if (score > 0.8) {
                    results.style.color = "red";
                    if (navigator.vibrate) navigator.vibrate(500);
                } else {
                    results.style.color = "black";
                }
            }
        }

        // 비디오에서 특징 추출 (임시 함수 - 실제 라이브러리 연동 필요)
        function getFeaturesFromVideo(vElement) { return []; } 
    </script>
</body>
</html>
