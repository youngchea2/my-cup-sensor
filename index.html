<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Sensor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        button { padding: 20px; font-size: 20px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>AI 컵 센서 테스트</h1>
    <div id="status">준비 완료. 아래 버튼을 눌러주세요.</div>
    <br>
    <button id="run-btn">카메라 및 진동 시작</button>
    <div id="results" style="font-size: 24px; margin-top: 20px; font-weight: bold;"></div>

    <script src="edge-impulse-standalone.js"></script>
    <script src="run-impulse.js"></script>

    <script>
        const btn = document.getElementById('run-btn');
        btn.onclick = function() {
            document.getElementById('status').innerText = '카메라 연결 시도 중...';
            // run-impulse.js 내부의 초기화 함수를 호출하거나 
            // 직접 카메라를 띄우는 로직이 작동하도록 유도합니다.
            if(window.classifier) {
                document.getElementById('status').innerText = '작동 중!';
            }
        };

        const originalLog = console.log;
        console.log = function (message) {
            originalLog.apply(console, arguments);
            if (typeof message === 'string' && message.includes('CUP')) {
                document.getElementById('results').innerText = message;
                const scoreMatch = message.match(/CUP\s*\(([0-9.]+)\)/);
                if (scoreMatch && parseFloat(scoreMatch[1]) > 0.8) {
                    if (navigator.vibrate) navigator.vibrate(300);
                }
            }
        };
    </script>
</body>
</html>
