<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cup Detector - Final Fix</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #1a1a2e; color: white; padding: 20px; }
        video { width: 100%; max-width: 400px; border-radius: 12px; background: #000; }
        #status { font-size: 1.5rem; margin: 20px 0; font-weight: bold; }
        #scores { font-size: 1rem; color: #00ff00; margin-bottom: 15px; }
        .btns button { padding: 15px 30px; font-size: 18px; border-radius: 8px; border: none; cursor: pointer; background: #6c63ff; color: white; }
        #log { font-size: 0.7rem; color: #888; text-align: left; background: #000; padding: 10px; height: 100px; overflow-y: auto; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>🔍 컵 감지 시스템</h2>
    <video id="video" autoplay playsinline muted></video>
    <div id="status">엔진 로드 중...</div>
    <div id="scores">--- %</div>
    <div class="btns">
        <button id="startBtn" onclick="startCamera()" disabled>감지 시작</button>
    </div>
    <div id="log"></div>

    <script src="edge-impulse-standalone.js"></script>

    <script>
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const scoresEl = document.getElementById('scores');
        const logEl = document.getElementById('log');
        let classifier;

        function log(m) { logEl.innerHTML += `<div>${new Date().toLocaleTimeString()} ${m}</div>`; logEl.scrollTop = logEl.scrollHeight; }

        // 1. 모델 초기화 및 라이브러리 방식 확인
        window.onload = () => {
            const check = setInterval(() => {
                classifier = window.EdgeImpulseClassifier || window.Module;
                if (classifier) {
                    clearInterval(check);
                    statusEl.innerText = "준비 완료! 버튼을 누르세요.";
                    document.getElementById('startBtn').disabled = false;
                    log("엔진 감지 성공");
                }
            }, 500);
        };

        // 2. 카메라 구동
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                statusEl.innerText = "실시간 분석 중...";
                setInterval(predict, 600);
            } catch (e) { log("카메라 오류: " + e.message); }
        }

        // 3. 핵심: 인자 개수(3개) 오류 수정 및 추론 실행
        async function predict() {
            if (!classifier) return;

            try {
                let result;
                // 방식 A: 최신 SDK (classify 메서드 존재 시)
                if (typeof classifier.classify === 'function') {
                    result = await classifier.classify(video);
                } 
                // 방식 B: Wasm/Module SDK (run_classifier 메서드 존재 시)
                else if (typeof classifier.run_classifier === 'function') {
                    // 비디오 프레임을 픽셀 데이터로 변환 (96x96 권장)
                    const canvas = document.createElement('canvas');
                    canvas.width = 96; canvas.height = 96;
                    canvas.getContext('2d').drawImage(video, 0, 0, 96, 96);
                    const imgData = canvas.getContext('2d').getImageData(0,0,96,96).data;
                    
                    const pixels = [];
                    for(let i=0; i<imgData.length; i+=4) {
                        pixels.push(imgData[i], imgData[i+1], imgData[i+2]);
                    }

                    // ★ 중요: 에러 해결 포인트 - 인자 3개를 정확히 전달
                    // 인수 1: 데이터 배열, 인수 2: 배열 길이, 인수 3: 디버그 여부(false)
                    result = classifier.run_classifier(pixels, pixels.length, false);
                }

                // 결과 파싱 및 화면 표시
                const labels = result.classification || result.results || (result.result && result.result.classification);
                if (labels) {
                    const cup = labels.find(l => l.label.toLowerCase().includes('cup'));
                    const score = cup ? (cup.value * 100).toFixed(1) : 0;
                    
                    scoresEl.innerText = labels.map(l => `${l.label}: ${(l.value*100).toFixed(0)}%`).join(' | ');

                    if (score > 70) {
                        statusEl.innerText = "🔔 컵 감지됨!!";
                        statusEl.style.color = "#ff4444";
                        if (navigator.vibrate) navigator.vibrate(300);
                    } else {
                        statusEl.innerText = "🔍 스캔 중...";
                        statusEl.style.color = "white";
                    }
                }
            } catch (err) {
                // 한 번만 로그에 에러 출력
                if (!window.errorLogged) { log("추론 중단됨: " + err.message); window.errorLogged = true; }
            }
        }
    </script>
</body>
</html>
