<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Cup Sensor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        #container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 450px; }
        video { width: 100%; background: #000; border-radius: 10px; display: none; margin-top: 10px; }
        button { padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; display: none; width: 100%; }
        #status { margin: 15px 0; font-weight: bold; color: #555; }
        #results { font-size: 24px; margin-top: 15px; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>
    <div id="container">
        <h1>AI 컵 센서</h1>
        <div id="status">시스템 초기화 중...</div>
        <button id="start-btn">카메라 및 센서 시작</button>
        <video id="video" autoplay playsinline></video>
        <div id="results"></div>
    </div>

    <script>
        const status = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const video = document.getElementById('video');
        const results = document.getElementById('results');
        let classifier;

        // 1. 라이브러리 강제 로드 함수
        function loadScript(url) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                // 캐시 방지를 위해 랜덤 번호를 붙여서 불러옵니다
                script.src = url + "?v=" + Math.random();
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        // 2. 실행 순서 제어
        async function initSystem() {
            try {
                status.innerText = "라이브러리 로딩 중...";
                // 깃허브에 있는 파일명을 순서대로 불러옵니다
                await loadScript('edge-impulse-standalone.js');
                
                status.innerText = "준비 완료! 버튼을 누르세요.";
                status.style.color = "green";
                startBtn.style.display = "block";
            } catch (e) {
                status.innerText = "에러: 파일을 찾을 수 없습니다. (파일명/대소문자 확인)";
                status.style.color = "red";
            }
        }

        // 3. 버튼 클릭 시 동작
        startBtn.onclick = async () => {
            try {
                startBtn.style.display = "none";
                status.innerText = "카메라 권한 요청 중...";

                // 카메라 시작
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                video.style.display = "block";

                // 모델 초기화
                status.innerText = "AI 모델 데이터 로딩 중...";
                classifier = new EdgeImpulseClassifier();
                await classifier.init();
                
                status.innerText = "인식 중... 컵을 비춰보세요!";
                setInterval(classify, 500);
            } catch (err) {
                status.innerText = "오류: " + err.message;
                status.style.color = "red";
            }
        };

        async function classify() {
            if (!classifier) return;
            try {
                const res = await classifier.classify(); 
                if (res.classification) {
                    const cup = res.classification.find(i => i.label === 'CUP');
                    const score = cup ? cup.value : 0;
                    results.innerText = "CUP 감지: " + (score * 100).toFixed(1) + "%";

                    if (score > 0.8) {
                        results.style.color = "red";
                        if (navigator.vibrate) navigator.vibrate(500); 
                    } else {
                        results.style.color = "#007bff";
                    }
                }
            } catch (e) { }
        }

        // 초기화 실행
        initSystem();
    </script>
</body>
</html>
