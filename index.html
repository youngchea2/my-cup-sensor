<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>컵 감지기</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #1a1a2e; color: white; }
    video { width: 100%; max-width: 480px; border-radius: 12px; }
    canvas { display: none; }
    #status { font-size: 2rem; margin: 16px; }
    #result { font-size: 1.2rem; color: #aaa; }
    button { padding: 12px 32px; font-size: 1rem; border-radius: 8px;
             background: #6c63ff; color: white; border: none; cursor: pointer; margin: 8px; }
  </style>
</head>
<body>
  <h2>🔍 컵 감지기</h2>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="status">대기 중...</div>
  <div id="result"></div>
  <button onclick="startDetection()">감지 시작</button>
  <button onclick="stopDetection()">중지</button>

  <!-- Edge Impulse WASM 모델 (다운받은 파일 경로로 변경) -->
  <script src="edge-impulse-standalone.js"></script>
  <script>
    let running = false;
    let audioCtx = null;

    // 알람 소리 생성 (Web Audio API)
    function playAlarm() {
      audioCtx = audioCtx || new AudioContext();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.setValueAtTime(660, audioCtx.currentTime + 0.2);
      osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.6);
    }

    async function startDetection() {
      const video = document.getElementById('video');
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' } // 후면 카메라
      });
      video.srcObject = stream;
      running = true;
      runLoop();
    }

    function stopDetection() {
      running = false;
      document.getElementById('status').textContent = '중지됨';
    }

    async function runLoop() {
      if (!running) return;

      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      // 모델 입력 크기에 맞게 (학습시 설정한 크기)
      canvas.width = 96;
      canvas.height = 96;
      ctx.drawImage(video, 0, 0, 96, 96);

      const imageData = ctx.getImageData(0, 0, 96, 96);

      // Edge Impulse 추론 실행
      const result = await EdgeImpulseClassifier.classify(
        Array.from(imageData.data)
      );

      const cupScore = result.results.find(r => r.label === 'cup')?.value || 0;
      const statusEl = document.getElementById('status');
      const resultEl = document.getElementById('result');

      resultEl.textContent = result.results
        .map(r => `${r.label}: ${(r.value * 100).toFixed(1)}%`)
        .join('  |  ');

      if (cupScore > 0.8) { // 80% 이상 확신할 때 알람
        statusEl.textContent = '🔔 컵 감지됨!';
        statusEl.style.color = '#ff6b6b';
        playAlarm();
      } else {
        statusEl.textContent = '🔍 스캔 중...';
        statusEl.style.color = 'white';
      }

      setTimeout(runLoop, 500); // 0.5초마다 추론
    }
  </script>
</body>
</html>
