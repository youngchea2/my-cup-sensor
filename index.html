<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Cup Sensor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        #camera-container { width: 100%; max-width: 400px; margin: 0 auto; background: #eee; min-height: 250px; border: 2px dashed #ccc; }
        button { padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; margin: 10px; }
    </style>
</head>
<body>
    <h1>컵 감지 센서</h1>
    <div id="status">상태: 라이브러리 로딩 확인 중...</div>
    <button id="start-btn">카메라 권한 허용 및 시작</button>
    <div id="camera-container"></div>
    <div id="results" style="font-size: 20px; font-weight: bold; margin-top: 10px;"></div>

    <script>
        // 파일 로딩 확인용
        function checkFile(name) {
            console.log(name + " 로드 시도...");
        }
    </script>
    <script src="edge-impulse-standalone.js" onload="checkFile('JS 엔진')"></script>
    <script src="run-impulse.js" onload="checkFile('런타임')"></script>

    <script>
        const status = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');

        // 파일이 정상적으로 로드되었는지 3초 후 점검
        setTimeout(() => {
            if (typeof EdgeImpulseClassifier === 'undefined') {
                status.innerText = "상태: 에러 - 라이브러리 파일을 찾을 수 없음";
                status.style.color = "red";
            } else {
                status.innerText = "상태: 준비 완료! 버튼을 누르세요.";
                status.style.color = "green";
            }
        }, 3000);

        startBtn.onclick = function() {
            status.innerText = "상태: 카메라 구동 시도 중...";
            // 진동 테스트 (버튼 누를 때 바로 울리는지 확인)
            if (navigator.vibrate) navigator.vibrate(100);
        };

        // 결과 가로채기
        const vLog = console.log;
        console.log = function (msg) {
            vLog.apply(console, arguments);
            if (typeof msg === 'string' && msg.includes('CUP')) {
                document.getElementById('results').innerText = msg;
                if (msg.includes('0.8') || msg.includes('0.9')) {
                    if (navigator.vibrate) navigator.vibrate(500);
                }
            }
        };
    </script>
</body>
</html>
