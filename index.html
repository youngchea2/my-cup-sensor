<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cup Sensor - Ultimate Fix</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #1a1a2e; color: white; padding: 20px; margin: 0; }
        video { width: 100%; max-width: 400px; border-radius: 12px; background: #000; margin-top: 10px; }
        #status { font-size: 1.4rem; margin: 20px 0; font-weight: bold; color: #6c63ff; }
        #scores { font-size: 1.1rem; color: #00ff00; margin-bottom: 15px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; }
        button { padding: 18px 36px; font-size: 18px; border-radius: 50px; border: none; cursor: pointer; background: #28a745; color: white; font-weight: bold; }
        #log { font-size: 0.7rem; color: #888; text-align: left; background: #000; padding: 10px; height: 100px; overflow-y: auto; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>🔍 AI 컵 감지 시스템</h2>
    <video id="video" autoplay playsinline muted></video>
    <div id="status">시스템 로딩 중...</div>
    <div id="scores">--- %</div>
    <button id="startBtn" onclick="startSystem()" disabled>시스템 시작</button>
    <div id="log"></div>

    <script src="edge-impulse-standalone.js"></script>

    <script>
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const scoresEl = document.getElementById('scores');
        const logEl = document.getElementById('log');
        let classifier;

        function log(m) { logEl.innerHTML += `<div>${new Date().toLocaleTimeString()} ${m}</div>`; logEl.scrollTop = logEl.scrollHeight; }

        window.onload = () => {
            const check = setInterval(() => {
                classifier = window.EdgeImpulseClassifier || window.Module;
                if (classifier && (typeof classifier.run_classifier === 'function' || typeof classifier.classify === 'function')) {
                    clearInterval(check);
                    statusEl.innerText = "준비 완료! 시작 버튼을 누르세요.";
                    document.getElementById('startBtn').disabled = false;
                    log("엔진 로드 성공");
                }
            }, 500);
        };

        async function startSystem() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                statusEl.innerText = "실시간 분석 중...";
                document.getElementById('startBtn').style.display = 'none';
                
                // 0.5초마다 분석
                setInterval(runInference, 500);
            } catch (e) { log("카메라 오류: " + e.message); }
        }

        async function runInference() {
            if (!classifier) return;

            try {
                // 1. 영상 캡처 (96x96)
                const canvas = document.createElement('canvas');
                canvas.width = 96; canvas.height = 96;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, 96, 96);
                const imgData = ctx.getImageData(0, 0, 96, 96).data;

                // 2. Wasm 전용 Float32 정규화 (0~1 사이 값)
                // 대부분의 Edge Impulse Wasm 모델은 Float32 입력을 선호합니다.
                const inputData = new Float32Array(96 * 96 * 3);
                for (let i = 0, j = 0; i < imgData.length; i += 4, j += 3) {
                    inputData[j] = imgData[i] / 255.0;     // R
                    inputData[j+1] = imgData[i+1] / 255.0; // G
                    inputData[j+2] = imgData[i+2] / 255.0; // B
                }

                // 3. 추론 실행 (방식에 따라 자동 선택)
                let result;
                if (typeof classifier.classify === 'function') {
                    result = await classifier.classify(inputData);
                } else {
                    // Wasm 직접 호출: 인자 3개 유지
                    result = classifier.run_classifier(inputData, inputData.length, false);
                }

                // 4. 결과 출력
                const labels = result.classification || result.results || (result.result && result.result.classification);
                if (labels) {
                    scoresEl.innerText = labels.map(l => `${l.label}: ${(l.value * 100).toFixed(0)}%`).join(' | ');
                    
                    const cup = labels.find(l => l.label.toLowerCase().includes('cup'));
                    if (cup && cup.value > 0.7) {
                        statusEl.innerText = "🔔 컵 감지됨!";
                        statusEl.style.color = "#ff4444";
                        if (navigator.vibrate) navigator.vibrate(200);
                    } else {
                        statusEl.innerText = "🔍 스캔 중...";
                        statusEl.style.color = "white";
                    }
                }
            } catch (err) {
                // 에러 발생 시 로그에 한 번만 표시
                if (!window.errCount) { log("추론 오류: " + err.message); window.errCount = 1; }
            }
        }
    </script>
</body>
</html>
