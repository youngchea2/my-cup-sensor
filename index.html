<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cup Detector - Memory Fix</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #1a1a2e; color: white; padding: 20px; }
        video { width: 100%; max-width: 400px; border-radius: 12px; background: #000; }
        #status { font-size: 1.5rem; margin: 20px 0; font-weight: bold; }
        #scores { font-size: 1.2rem; color: #00ff00; margin-bottom: 15px; min-height: 1.5em; }
        .btns button { padding: 15px 30px; font-size: 18px; border-radius: 8px; border: none; cursor: pointer; background: #6c63ff; color: white; }
        #log { font-size: 0.7rem; color: #888; text-align: left; background: #000; padding: 10px; height: 120px; overflow-y: auto; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>
    <h2>🔍 AI 컵 감지 시스템</h2>
    <video id="video" autoplay playsinline muted></video>
    <div id="status">시스템 준비 중...</div>
    <div id="scores">--- %</div>
    <div class="btns">
        <button id="startBtn" onclick="startCamera()" disabled>감지 시작</button>
    </div>
    <div id="log"></div>

    <script src="edge-impulse-standalone.js"></script>

    <script>
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const scoresEl = document.getElementById('scores');
        const logEl = document.getElementById('log');
        let classifier;

        function log(m) { logEl.innerHTML += `<div>${new Date().toLocaleTimeString()} ${m}</div>`; logEl.scrollTop = logEl.scrollHeight; }

        window.onload = () => {
            const check = setInterval(() => {
                classifier = window.EdgeImpulseClassifier || window.Module;
                if (classifier) {
                    clearInterval(check);
                    statusEl.innerText = "준비 완료! 감지 시작을 누르세요.";
                    document.getElementById('startBtn').disabled = false;
                    log("엔진 로드 성공");
                }
            }, 500);
        };

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                video.srcObject = stream;
                statusEl.innerText = "실시간 분석 중...";
                setInterval(predict, 500);
            } catch (e) { log("카메라 오류: " + e.message); }
        }

        async function predict() {
            if (!classifier) return;

            try {
                // 1. 이미지 캡처 및 전처리 (96x96 사이즈)
                const canvas = document.createElement('canvas');
                canvas.width = 96; canvas.height = 96;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, 96, 96);
                const imgData = ctx.getImageData(0, 0, 96, 96).data;
                
                // 2. 중요: Uint8Array로 변환 (Cannot convert 에러 해결책)
                const pixels = new Uint8Array(96 * 96 * 3);
                for (let i = 0, j = 0; i < imgData.length; i += 4, j += 3) {
                    pixels[j] = imgData[i];     // R
                    pixels[j+1] = imgData[i+1]; // G
                    pixels[j+2] = imgData[i+2]; // B
                }

                // 3. 추론 실행
                let result;
                if (typeof classifier.run_classifier === 'function') {
                    // 정확한 3개 인자 전달: 데이터(TypedArray), 길이, 디버그모드
                    result = classifier.run_classifier(pixels, pixels.length, false);
                } else if (typeof classifier.classify === 'function') {
                    result = await classifier.classify(pixels);
                }

                // 4. 결과 출력
                const labels = result.classification || result.results || (result.result && result.result.classification);
                if (labels && labels.length > 0) {
                    scoresEl.innerText = labels.map(l => `${l.label}: ${(l.value * 100).toFixed(0)}%`).join(' | ');
                    
                    const cup = labels.find(l => l.label.toLowerCase().includes('cup'));
                    if (cup && cup.value > 0.7) {
                        statusEl.innerText = "🔔 컵 감지됨!!";
                        statusEl.style.color = "#ff4444";
                        if (navigator.vibrate) navigator.vibrate(200);
                    } else {
                        statusEl.innerText = "🔍 스캔 중...";
                        statusEl.style.color = "white";
                    }
                }
            } catch (err) {
                log("분석 중단됨: " + err.message);
            }
        }
    </script>
</body>
</html>
