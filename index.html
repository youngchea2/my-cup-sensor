<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Cup Sensor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        video { width: 100%; max-width: 400px; background: #000; border-radius: 10px; }
        button { padding: 15px 30px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 8px; margin: 10px; }
    </style>
</head>
<body>
    <h1>AI 컵 센서</h1>
    <div id="status">준비 완료</div>
    <button id="start-btn">카메라 및 센서 시작</button>
    <br>
    <video id="video" autoplay playsinline></video>
    <div id="results" style="font-size: 24px; margin-top: 15px; font-weight: bold;"></div>

    <script src="https://youngchea2.github.io/my-cup-sensor/edge-impulse-standalone.js" onerror="document.getElementById('status').innerText='에러: 주소로도 로드 실패'"></script>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const results = document.getElementById('results');
        let classifier;

        document.getElementById('start-btn').onclick = async () => {
            try {
                status.innerText = "초기화 중...";
                
                // 1. 카메라 켜기
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;

                // 2. 모델 라이브러리 존재 확인
                if (typeof EdgeImpulseClassifier === 'undefined') {
                    throw new Error("라이브러리가 로드되지 않았습니다. 파일명을 확인하세요.");
                }

                // 3. 모델 초기화
                classifier = new EdgeImpulseClassifier();
                await classifier.init();
                status.innerText = "작동 중!";
                
                // 4. 분석 루프 시작
                setInterval(classify, 500);

            } catch (err) {
                status.innerText = "에러: " + err.message;
                status.style.color = "red";
            }
        };

        async function classify() {
            if (!classifier) return;
            
            // 이미지 분석 시도 (Edge Impulse 표준 함수 사용)
            try {
                const res = await classifier.classify(getFeaturesFromVideo(video));
                
                if (res.classification) {
                    const cup = res.classification.find(i => i.label === 'CUP');
                    const score = cup ? cup.value : 0;
                    results.innerText = "CUP: " + (score * 100).toFixed(1) + "%";

                    if (score > 0.8) {
                        results.style.color = "red";
                        if (navigator.vibrate) navigator.vibrate(500);
                    } else {
                        results.style.color = "black";
                    }
                }
            } catch (e) {
                console.log("분석 중...");
            }
        }

        // 특징 추출 도우미 함수
        function getFeaturesFromVideo(v) { return []; }
    </script>
</body>
</html>
