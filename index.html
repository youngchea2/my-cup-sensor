<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Cup Sensor - Final</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { text-align: center; font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; }
        #container { padding: 20px; }
        video { width: 100%; max-width: 400px; border-radius: 10px; background: #000; margin-bottom: 15px; }
        #result { font-size: 32px; font-weight: bold; color: #00ff00; margin: 20px 0; }
        .status { font-size: 14px; color: #aaa; }
        button { padding: 20px; width: 80%; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="container">
        <h2>AI 컵 센서</h2>
        <div id="status" class="status">엔진 준비 중...</div>
        <div id="result">--- %</div>
        <video id="video" autoplay playsinline></video><br>
        <button id="start-btn" style="display:none;">센서 시작하기</button>
    </div>

    <script src="edge-impulse-standalone.js"></script>

    <script>
        const video = document.getElementById('video');
        const resultDiv = document.getElementById('result');
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');

        // Module 방식은 로딩 완료를 기다려야 합니다.
        if (typeof Module !== 'undefined') {
            Module.onRuntimeInitialized = function() {
                statusDiv.innerText = "준비 완료! 버튼을 누르세요.";
                startBtn.style.display = "inline-block";
            };
        }

        startBtn.onclick = async () => {
            startBtn.style.display = "none";
            statusDiv.innerText = "카메라 켜는 중...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: 128, height: 128 } 
                });
                video.srcObject = stream;

                // 분석 시작
                statusDiv.innerText = "실시간 분석 중...";
                setInterval(runInference, 500);
            } catch (err) {
                statusDiv.innerText = "카메라 에러: " + err.message;
            }
        };

        async function runInference() {
            if (typeof Module === 'undefined' || !Module.classifier) return;

            try {
                // 이 라이브러리의 특수한 호출 방식입니다.
                const result = Module.classifier.classify();
                const cup = result.classification.find(i => i.label.toUpperCase().includes('CUP'));
                
                if (cup) {
                    const score = (cup.value * 100).toFixed(1);
                    resultDiv.innerText = "CUP: " + score + "%";
                    
                    if (cup.value > 0.8) {
                        resultDiv.style.color = "#ff4444";
                        if (navigator.vibrate) navigator.vibrate(300);
                    } else {
                        resultDiv.style.color = "#00ff00";
                    }
                }
            } catch (e) {
                console.log("분석 오류:", e);
            }
        }
    </script>
</body>
</html>
