<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Cup Sensor - Final</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        #container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 500px; }
        video { width: 100%; background: #000; border-radius: 10px; display: none; margin-top: 10px; }
        button { padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; display: none; width: 100%; }
        #status { margin: 15px 0; font-weight: bold; }
        #results { font-size: 24px; margin-top: 15px; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>
    <div id="container">
        <h1>AI 컵 센서</h1>
        <div id="status" style="color: blue;">시스템 초기화 중...</div>
        <button id="start-btn">카메라 및 센서 시작</button>
        <video id="video" autoplay playsinline></video>
        <div id="results"></div>
    </div>

    <script src="edge-impulse-standalone.js" onload="onLibraryLoaded()" onerror="onLibraryError()"></script>

    <script>
        const status = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const video = document.getElementById('video');
        const results = document.getElementById('results');
        let classifier;

        // 라이브러리가 로드되면 버튼을 보여줍니다.
        function onLibraryLoaded() {
            status.innerText = "라이브러리 로드 완료! 버튼을 누르세요.";
            status.style.color = "green";
            startBtn.style.display = "block";
        }

        function onLibraryError() {
            status.innerText = "에러: edge-impulse-standalone.js 파일을 찾을 수 없습니다.";
            status.style.color = "red";
        }

        startBtn.onclick = async () => {
            try {
                startBtn.style.display = "none";
                status.innerText = "카메라 및 AI 엔진 기동 중...";
                status.style.color = "blue";

                // 1. 카메라 시작
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                video.style.display = "block";

                // 2. 클래스 이름 자동 감지 (버전에 따라 이름이 다를 수 있음)
                const ClassifierClass = window.EdgeImpulseClassifier || window.Classifier;
                
                if (!ClassifierClass) {
                    throw new Error("라이브러리 내부 클래스를 찾을 수 없습니다. (JS 파일 내용 확인 필요)");
                }

                // 3. 모델 초기화 (WASM 파일 로드)
                classifier = new ClassifierClass();
                await classifier.init();
                
                status.innerText = "인식 중... 컵을 비춰보세요!";
                setInterval(classify, 500);

            } catch (err) {
                status.innerText = "초기화 실패: " + err.message;
                status.style.color = "red";
                console.error(err);
            }
        };

        async function classify() {
            if (!classifier) return;
            try {
                const res = await classifier.classify(); 
                if (res.classification) {
                    // 레이블 이름이 'CUP'인지 확인 (대소문자 무관하게 처리)
                    const cup = res.classification.find(i => i.label.toUpperCase() === 'CUP');
                    const score = cup ? cup.value : 0;
                    results.innerText = "CUP 감지: " + (score * 100).toFixed(1) + "%";

                    if (score > 0.8) {
                        results.style.color = "red";
                        if (navigator.vibrate) navigator.vibrate(500); // 80% 넘으면 진동
                    } else {
                        results.style.color = "#007bff";
                    }
                }
            } catch (e) { }
        }
    </script>
</body>
</html>
